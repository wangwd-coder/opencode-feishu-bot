# Feishu/Lark Bot Configuration
feishu:
  app_id: "${LARK_APP_ID}"
  app_secret: "${LARK_APP_SECRET}"
  # Use "lark" for international (larksuite.com), "feishu" for China (feishu.cn)
  domain: "feishu"

# WeChat Bot Configuration
wechat:
  # Enable/disable WeChat bot
  enabled: ${WECHAT_ENABLED:false}
  # Allowed users (comma-separated WeChat IDs, empty = allow all)
  allowed_users: ${WECHAT_ALLOWED_USERS:}
  # Data storage directory
  data_dir: ${WECHAT_DATA_DIR:./data/wechat}
  # API endpoints
  api_base_url: "https://ilinkai.weixin.qq.com"
  cdn_base_url: "https://cdn.ilinkai.weixin.qq.com"
  # Polling timeouts (seconds)
  poll_timeout: 35
  api_timeout: 15

# OpenCode Server Configuration
opencode:
  server_url: "${OPENCODE_SERVER_URL:http://localhost:4096}"
  username: "${OPENCODE_USERNAME:opencode}"
  password: "${OPENCODE_PASSWORD}"

# Session Management
session:
  # Time-to-live in seconds for idle sessions
  ttl: 3600
  # Maximum concurrent sessions
  max_sessions: 100
  # Warning time before expiry in seconds (e.g., 300 = 5 minutes before expiry)
  warning_before_ttl: 300

# Streaming Configuration
streaming:
  # Update interval in milliseconds for card updates
  update_interval: 500
  # Minimum text length before sending update
  min_chunk_size: 10
