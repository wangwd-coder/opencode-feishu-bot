services:
  feishu-bot:
    build: .
    container_name: opencode-feishu-bot
    restart: unless-stopped
    # Prevent Docker from restarting too fast on startup failures
    # Backoff delay set via restart policy (only works with Docker Engine 25+ / compose v2.27+)
    # For older versions, use a wrapper script with sleep
    env_file:
      - .env
    environment:
      # 容器内访问宿主机的 OpenCode 服务器
      - OPENCODE_SERVER_URL=http://host.docker.internal:4096
      # 通过 /Users mount 读取宿主机的 opencode 配置(模型列表等)
      - HOST_USER=digua
    volumes:
      # 只读挂载宿主机文件系统，用于目录浏览功能
      - /Users:/Users:ro
    # macOS/Windows Docker Desktop 自带 host.docker.internal
    # Linux 需要取消下面的注释
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
